openapi: 3.1.0
info:
  title: SubDub API
  version: 2.0.1
  description: |
    OpenAPI contract for the current Clerk-backed SubDub API.

    Notes:
    - Base API prefix is /api/v1.
    - The frontend authenticates with Clerk and sends a session token as a Bearer token.
    - The backend keeps a local Mongo user profile keyed by clerkId for subscriptions and reminder emails.
    - This repo mounts Clerk middleware globally, so the backend environment must include CLERK_PUBLISHABLE_KEY.
    - CLERK_JWT_KEY is the JWT verification key, not the publishable key, and is optional but recommended.
servers:
  - url: http://localhost:5500
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Subscriptions
  - name: Webhooks
paths:
  /:
    get:
      tags: [Health]
      summary: Service health check
      responses:
        '200':
          description: Plain text health response
          content:
            text/plain:
              schema:
                type: string
                example: Hello World!

  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: Deprecated local sign-up route
      responses:
        '410':
          $ref: '#/components/responses/DeprecatedAuth'

  /api/v1/auth/signin:
    post:
      tags: [Auth]
      summary: Deprecated local sign-in route
      responses:
        '410':
          $ref: '#/components/responses/DeprecatedAuth'

  /api/v1/auth/signout:
    post:
      tags: [Auth]
      summary: Informational sign-out route
      responses:
        '200':
          description: Sign-out handled on the frontend by Clerk
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/webhooks/clerk:
    post:
      tags: [Webhooks]
      summary: Clerk webhook receiver
      responses:
        '200':
          description: Webhook processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: Get current user by Mongo id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/subscriptions:
    get:
      tags: [Subscriptions]
      summary: List the current user's subscriptions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Paginated subscriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Subscriptions]
      summary: Create a subscription for the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionInput'
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/subscriptions/me:
    get:
      tags: [Subscriptions]
      summary: Alias for listing the current user's subscriptions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Paginated subscriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionListResponse'

  /api/v1/subscriptions/user/{id}:
    get:
      tags: [Subscriptions]
      summary: Compatibility route for older clients
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Paginated subscriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionListResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/subscriptions/upcoming-renewals:
    get:
      tags: [Subscriptions]
      summary: List the current user's upcoming renewals
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Upcoming renewals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/subscriptions/me/upcoming-renewals:
    get:
      tags: [Subscriptions]
      summary: Alias for the current user's upcoming renewals
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Upcoming renewals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionListResponse'

  /api/v1/subscriptions/{id}:
    get:
      tags: [Subscriptions]
      summary: Get one subscription owned by the current user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Subscriptions]
      summary: Update one owned subscription
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionInput'
      responses:
        '200':
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Subscriptions]
      summary: Delete one owned subscription
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/subscriptions/{id}/cancel:
    put:
      tags: [Subscriptions]
      summary: Cancel one owned subscription
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PageQuery:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
  responses:
    Unauthorized:
      description: Missing or invalid Clerk session token
    Forbidden:
      description: Authenticated but not allowed to access the resource
    NotFound:
      description: Resource not found
    BadRequest:
      description: Invalid request payload
    DeprecatedAuth:
      description: Local email/password auth has been removed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
  schemas:
    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    User:
      type: object
      properties:
        _id:
          type: string
        clerkId:
          type: string
        name:
          type: string
        email:
          type: string
        authProvider:
          type: string
        imageUrl:
          type: string
    UserResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/User'
    Subscription:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        price:
          type: number
        currency:
          type: string
        frequency:
          type: string
        category:
          type: string
        color:
          type: string
          pattern: '^#(?:[0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$'
          default: '#2563EB'
        startDate:
          type: string
          format: date-time
        renewalDate:
          type: string
          format: date-time
        paymentMethod:
          type: string
        status:
          type: string
        user:
          type: string
    SubscriptionInput:
      type: object
      required:
        - name
        - price
        - currency
        - frequency
        - category
        - startDate
        - paymentMethod
      properties:
        name:
          type: string
        price:
          type: number
        currency:
          type: string
        frequency:
          type: string
        category:
          type: string
        color:
          type: string
          pattern: '^#(?:[0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$'
          default: '#2563EB'
        startDate:
          type: string
          format: date-time
        renewalDate:
          type: string
          format: date-time
        paymentMethod:
          type: string
    Pagination:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
        hasNextPage:
          type: boolean
        hasPrevPage:
          type: boolean
    SubscriptionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/Subscription'
    SubscriptionListResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
        pagination:
          $ref: '#/components/schemas/Pagination'
    SubscriptionCreateResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            subscription:
              $ref: '#/components/schemas/Subscription'
            workflowRunId:
              type: string
